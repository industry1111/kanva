name: CI

# 트리거 조건
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 실행할 작업 목록
jobs:

  # === 백엔드 빌드 ===
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 빌드
        working-directory: backend
        run: chmod +x gradlew && ./gradlew build

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 & Push
        working-directory: backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/kanva-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/kanva-backend:latest
      
  deploy:
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: EC2에 배포
        uses: appleboy/ssh-action@master
        with:
           host: ${{ secrets.EC2_HOST }}
           username: ${{ secrets.EC2_USERNAME }}
           key: ${{ secrets.EC2_KEY }}
           script: |
            sudo kill $(sudo lsof -t -i:8080) || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/kanva-backend:latest
            docker stop kanva-backend || true
            docker rm kanva-backend || true
            docker run -d --name kanva-backend -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/kanva-backend:latest



