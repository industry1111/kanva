name: CI

# 트리거 조건
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 실행할 작업 목록
jobs:

  # === 백엔드 빌드 ===
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Gradle 빌드
        working-directory: backend
        run: chmod +x gradlew && ./gradlew build

      - name: Docker Hub 로그인
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 & Push
        if: github.event_name == 'push'
        working-directory: backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/kanva-backend:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/kanva-backend:latest

  # === 프론트엔드 빌드 ===
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 프론트엔드 빌드
        working-directory: frontend
        run: npm run build

  deploy:
    needs: [backend, frontend]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: EC2에 배포
        uses: appleboy/ssh-action@master
        with:
           host: ${{ secrets.EC2_HOST }}
           username: ${{ secrets.EC2_USERNAME }}
           key: ${{ secrets.EC2_KEY }}
           script: |
             # 백엔드 배포
             sudo kill $(sudo lsof -t -i:8080) || true
             docker pull ${{ secrets.DOCKERHUB_USERNAME }}/kanva-backend:latest
             docker stop kanva-backend || true
             docker rm kanva-backend || true
             docker run -d --name kanva-backend -p 8080:8080 --env-file ~/.env ${{ secrets.DOCKERHUB_USERNAME }}/kanva-backend:latest

             # 프론트엔드 배포
             cd ~/kanva/frontend
             git pull
             npm ci
             npm run build

